<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTech Academy — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <div class="login-card">

        <div class="login-logo">
            <div class="login-logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="login-logo-text">Edu<span>Tech</span></div>
        </div>

        <h1 class="login-heading">Welcome back</h1>
        <p class="login-sub">Sign in to continue your learning journey</p>

        <div class="form-group">
            <label class="form-label" for="nameInput">Full Name</label>
            <div class="form-input-wrap">
                <i class="fas fa-user"></i>
                <input type="text" class="form-input" id="nameInput" placeholder="Enter Your Name" autocomplete="off">
            </div>
            <div class="error-msg" id="nameError"></div>
        </div>

        <div class="form-group">
            <label class="form-label" for="passInput">Password</label>
            <div class="form-input-wrap">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-input" id="passInput" placeholder="Min. 8 characters">
            </div>
            <div class="error-msg" id="passError"></div>
        </div>

        <button class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i>
            Sign In
        </button>

        <div class="divider">demo credentials</div>

        <div class="demo-hint">
            Name: <strong>Any name</strong> &nbsp;|&nbsp; Password: <strong>Min. 8 characters</strong><br>
            <small>This is a frontend demo — no real auth</small>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
